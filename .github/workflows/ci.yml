name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            tools/ui-preview/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir tools/ui-preview install --frozen-lockfile
      - run: pnpm verify
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3-extension
          path: .output/chrome-mv3
          if-no-files-found: error
          retention-days: 14
