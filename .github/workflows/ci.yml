name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            tools/ui-preview/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # The preview keeps an independent lockfile beneath the root project.
      # Install it outside the parent workspace, allowing build scripts from its frozen lockfile.
      - run: pnpm --dir tools/ui-preview install --frozen-lockfile --ignore-workspace --config.dangerouslyAllowAllBuilds=true
      - run: pnpm audit
      - run: pnpm verify
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chrome-mv3-extension
          path: .output/chrome-mv3
          if-no-files-found: error
          retention-days: 14
